{{ define "main" }}
<article>
  <nav class="breadcrumbs">
    <a href="/">Home</a>
    {{- if .Section -}} / <a href="/{{ .Section }}/">{{ .Section | title }}</a>{{- end -}}
     / {{ .Title }}
  </nav>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="subtitle">{{ . }}</p>{{ end }}
  {{ .Content }}
</article>
{{ end }}
