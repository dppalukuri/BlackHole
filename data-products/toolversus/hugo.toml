baseURL = 'https://toolversus.techtools365.com/'
languageCode = 'en-us'
title = 'ToolVersus — Honest SaaS & AI Tool Comparisons'

[params]
  description = 'Compare SaaS and AI tools side-by-side. Honest pricing, features, and verdicts.'
  author = 'TechTools365'

[taxonomies]
  category = 'categories'
  tag = 'tags'

[outputs]
  home = ['HTML', 'RSS']
